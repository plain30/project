<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>현장설명회·입찰·수주 관리 시스템</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--main:#17324d;--sub:#2f75b5;--line:#d9e2ec;--text:#1f2937;--muted:#64748b;--danger:#dc2626;--warn:#f59e0b;--ok:#16a34a;--purple:#7c3aed}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans KR',Arial,sans-serif;background:var(--bg);color:var(--text)}
header{background:linear-gradient(135deg,var(--main),var(--sub));color:#fff;padding:22px 26px;position:sticky;top:0;z-index:20;box-shadow:0 4px 14px rgba(0,0,0,.16)}
header h1{margin:0;font-size:24px}header p{margin:6px 0 0;color:#dbeafe;font-size:14px}.wrap{display:grid;grid-template-columns:300px 1fr;gap:18px;padding:18px;max-width:1680px;margin:auto}.side,.card{background:var(--card);border:1px solid var(--line);border-radius:16px;box-shadow:0 4px 12px rgba(15,23,42,.06)}.side{padding:16px;height:calc(100vh - 118px);position:sticky;top:100px;overflow:auto}.main{display:flex;flex-direction:column;gap:18px}.btn{border:0;border-radius:10px;padding:10px 13px;cursor:pointer;font-weight:800;background:#e5edf7;color:#17324d}.btn.primary{background:var(--main);color:#fff}.btn.danger{background:#fee2e2;color:#991b1b}.btn.ok{background:#dcfce7;color:#166534}.btn.warn{background:#fef3c7;color:#92400e}.btn.full{width:100%;margin-bottom:8px}.btn:hover{filter:brightness(.96)}.search{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;margin:8px 0 12px}.list{display:flex;flex-direction:column;gap:8px}.item{border:1px solid var(--line);border-radius:12px;padding:11px;cursor:pointer;background:#fff}.item:hover,.item.active{border-color:var(--sub);background:#f0f7ff}.item b{display:block;font-size:14px}.item span{font-size:12px;color:var(--muted);line-height:1.5}.card{padding:18px}.card h2{margin:0 0 14px;font-size:20px;color:#17324d}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;font:inherit;background:#fff}.field textarea{min-height:76px;resize:vertical}.wide{grid-column:span 2}.fullrow{grid-column:1/-1}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}.stat{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px}.stat b{font-size:24px;color:var(--main)}.stat span{display:block;color:var(--muted);font-size:13px;margin-top:5px}table{width:100%;border-collapse:collapse;font-size:14px;background:#fff}th,td{border-bottom:1px solid var(--line);padding:10px;text-align:left;vertical-align:top}th{background:#f1f5f9;color:#334155;position:sticky;top:0}.tablebox{overflow:auto;max-height:440px;border:1px solid var(--line);border-radius:12px}.pill{display:inline-block;border-radius:999px;padding:4px 9px;font-size:12px;font-weight:800;background:#eef2ff;color:#3730a3}.status-설명회{background:#e0f2fe;color:#075985}.status-입찰예정{background:#fef3c7;color:#92400e}.status-투찰완료{background:#ede9fe;color:#5b21b6}.status-개찰완료{background:#dbeafe;color:#1e40af}.status-수주{background:#dcfce7;color:#166534}.status-미수주{background:#fee2e2;color:#991b1b}.status-포기{background:#f1f5f9;color:#475569}.risk-high{color:var(--danger);font-weight:900}.risk-mid{color:var(--warn);font-weight:900}.risk-low{color:var(--ok);font-weight:900}.tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}.tab{padding:9px 12px;border-radius:999px;border:1px solid var(--line);background:#fff;cursor:pointer;font-weight:800;color:#475569}.tab.active{background:var(--main);color:#fff;border-color:var(--main)}.hidden{display:none}.checks{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.checks label{background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:9px;display:flex;gap:7px;align-items:center}.money{text-align:right}.small{font-size:12px;color:var(--muted)}.timeline{display:grid;grid-template-columns:repeat(5,1fr);gap:8px}.step{border:1px solid var(--line);border-radius:12px;padding:12px;background:#f8fafc}.step.done{background:#ecfdf5;border-color:#86efac}.step.now{background:#eff6ff;border-color:#93c5fd}.step b{display:block}.step span{font-size:12px;color:var(--muted)}.summarybox{background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:14px;line-height:1.65}.filebox{border:2px dashed #bfd3e8;border-radius:14px;background:#f8fbff;padding:13px;color:var(--muted);font-size:13px}.photoPreview{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.photoPreview img{width:88px;height:70px;object-fit:cover;border-radius:10px;border:1px solid var(--line)}
@media(max-width:1100px){.wrap{grid-template-columns:1fr}.side{position:relative;top:0;height:auto}.grid,.stats{grid-template-columns:1fr 1fr}.wide{grid-column:span 2}.checks,.timeline{grid-template-columns:1fr 1fr}}@media(max-width:680px){.grid,.stats,.checks,.timeline{grid-template-columns:1fr}.wide{grid-column:span 1}}
@media print{header,.side,.noPrint,.actions,.tabs{display:none!important}.wrap{display:block;padding:0}.card{box-shadow:none;border:0;border-radius:0;padding:12px}.hidden{display:block!important}.tablebox{max-height:none;overflow:visible;border:0}body{background:#fff}.main{gap:4px}.stats{display:none}}
</style>
</head>
<body>
<header><h1>현장설명회 · 입찰 · 수주 관리 시스템</h1><p>현장설명회 참석 내용부터 입찰일, 투찰금액, 개찰결과, 수주현황까지 한 번에 관리하는 데모</p></header>
<div class="wrap">
<aside class="side noPrint">
<button class="btn primary full" onclick="newProject()">+ 신규 현장 등록</button>
<button class="btn full" onclick="downloadJSON()">데이터 백업(JSON)</button>
<label class="btn full" style="display:block;text-align:center">데이터 불러오기<input type="file" accept="application/json" hidden onchange="uploadJSON(event)"></label>
<input class="search" id="search" placeholder="현장명/발주처/공종/상태 검색" oninput="renderAll()" />
<div class="field"><label>상태 필터</label><select id="filterStatus" onchange="renderAll()"><option value="">전체</option><option>설명회</option><option>입찰예정</option><option>투찰완료</option><option>개찰완료</option><option>수주</option><option>미수주</option><option>포기</option></select></div>
<br><div class="list" id="projectList"></div>
</aside>
<main class="main">
<section class="stats noPrint">
<div class="stat"><b id="stTotal">0</b><span>전체 현장</span></div><div class="stat"><b id="stBidDue">0</b><span>입찰 예정</span></div><div class="stat"><b id="stSubmitted">0</b><span>투찰 완료</span></div><div class="stat"><b id="stWon">0</b><span>수주</span></div><div class="stat"><b id="stLost">0</b><span>미수주/포기</span></div><div class="stat"><b id="stWinRate">0%</b><span>수주율</span></div>
</section>
<section class="card noPrint"><h2>진행 현황 목록</h2><div class="tablebox"><table><thead><tr><th>상태</th><th>현장명</th><th>발주처</th><th>공종</th><th>현장설명회</th><th>입찰일</th><th>투찰금액</th><th>개찰결과</th><th>비고</th></tr></thead><tbody id="summaryRows"></tbody></table></div></section>
<section class="card"><h2>진행 단계</h2><div class="timeline" id="timeline"></div></section>
<section class="card"><h2>1. 기본정보</h2><div class="grid">
<div class="field"><label>현장명</label><input id="name"></div><div class="field"><label>발주처</label><input id="client"></div><div class="field"><label>담당자</label><input id="manager" value="한재식"></div><div class="field"><label>진행상태</label><select id="status"><option>설명회</option><option>입찰예정</option><option>투찰완료</option><option>개찰완료</option><option>수주</option><option>미수주</option><option>포기</option></select></div>
<div class="field"><label>현장설명회 일시</label><input id="briefingDate" type="datetime-local"></div><div class="field"><label>공종</label><select id="type"><option>항만토목</option><option>일반토목</option><option>건축</option><option>전기</option><option>기계설비</option><option>조경</option><option>기타</option></select></div><div class="field"><label>공사위치</label><input id="location"></div><div class="field"><label>입찰방식</label><select id="bidMethod"><option>적격심사</option><option>종합심사낙찰제</option><option>종합평가낙찰제</option><option>협상에 의한 계약</option><option>수의계약</option><option>기타</option></select></div>
<div class="field"><label>착공 예정</label><input id="startDate" type="date"></div><div class="field"><label>준공 예정</label><input id="endDate" type="date"></div><div class="field"><label>공사기간(자동)</label><input id="duration" readonly></div><div class="field"><label>추정금액/기초금액</label><input id="estimate" type="number" placeholder="원 단위"></div>
<div class="field fullrow"><label>주요 공사내용</label><textarea id="scope" placeholder="공사범위, 주요 공법, 특이 공정 등을 입력"></textarea></div></div></section>
<section class="card"><h2>2. 입찰 관리</h2><div class="grid">
<div class="field"><label>현장설명회 참석 여부</label><select id="briefingAttend"><option>참석</option><option>불참</option><option>대리참석</option><option>해당없음</option></select></div><div class="field"><label>질의 마감일</label><input id="questionDue" type="datetime-local"></div><div class="field"><label>입찰 마감일</label><input id="bidDue" type="datetime-local"></div><div class="field"><label>개찰일</label><input id="openDate" type="datetime-local"></div>
<div class="field"><label>예정가격</label><input id="expectedPrice" type="number" placeholder="원 단위"></div><div class="field"><label>투찰금액</label><input id="bidPrice" type="number" placeholder="원 단위"></div><div class="field"><label>투찰률(자동)</label><input id="bidRate" readonly></div><div class="field"><label>보증/서류 제출</label><select id="documents"><option>미확인</option><option>준비중</option><option>제출완료</option><option>보완필요</option></select></div>
<div class="field wide"><label>입찰 참여 판단</label><select id="decision"><option>검토중</option><option>참여</option><option>불참</option><option>보류</option></select></div><div class="field wide"><label>불참/보류 사유</label><input id="decisionReason" placeholder="공기, 수익성, 장비, 리스크 등"></div>
<div class="field fullrow"><label>입찰 관련 메모</label><textarea id="bidMemo" placeholder="투찰전략, 공동도급, 협력업체, 제출서류, 질의사항 등"></textarea></div></div></section>
<section class="card"><h2>3. 개찰 및 수주현황</h2><div class="grid">
<div class="field"><label>개찰 결과</label><select id="result"><option>미정</option><option>1순위</option><option>2순위</option><option>낙찰/수주</option><option>탈락/미수주</option><option>유찰</option><option>취소</option></select></div><div class="field"><label>낙찰사</label><input id="winner"></div><div class="field"><label>낙찰금액</label><input id="winPrice" type="number" placeholder="원 단위"></div><div class="field"><label>우리 순위</label><input id="ourRank" placeholder="예: 1순위, 3위"></div>
<div class="field"><label>계약 예정일</label><input id="contractDate" type="date"></div><div class="field"><label>계약금액</label><input id="contractPrice" type="number" placeholder="원 단위"></div><div class="field"><label>수주 확정일</label><input id="wonDate" type="date"></div><div class="field"><label>담당 부서</label><input id="dept"></div>
<div class="field fullrow"><label>수주/미수주 분석</label><textarea id="resultMemo" placeholder="수주 성공요인, 미수주 원인, 향후 대응사항"></textarea></div></div></section>
<section class="card"><h2>4. 지급자재</h2><div class="actions noPrint"><button class="btn" onclick="addMaterial()">+ 지급자재 추가</button></div><div class="tablebox"><table><thead><tr><th>자재명</th><th>지급주체</th><th>수량/규격</th><th>반입시기</th><th>비고</th><th class="noPrint">삭제</th></tr></thead><tbody id="materials"></tbody></table></div></section>
<section class="card"><h2>5. 질의응답</h2><div class="actions noPrint"><button class="btn" onclick="addQA()">+ 질의 추가</button></div><div class="tablebox"><table><thead><tr><th>질문</th><th>답변</th><th>반영사항</th><th class="noPrint">삭제</th></tr></thead><tbody id="qas"></tbody></table></div></section>
<section class="card"><h2>6. 리스크 및 체크리스트</h2><div class="grid"><div class="field"><label>기상/환경 리스크</label><select id="riskWeather"><option>낮음</option><option>보통</option><option>높음</option></select></div><div class="field"><label>민원 리스크</label><select id="riskCivil"><option>낮음</option><option>보통</option><option>높음</option></select></div><div class="field"><label>자재수급 리스크</label><select id="riskMaterial"><option>낮음</option><option>보통</option><option>높음</option></select></div><div class="field"><label>공기 리스크</label><select id="riskSchedule"><option>낮음</option><option>보통</option><option>높음</option></select></div><div class="field fullrow"><label>체크리스트</label><div class="checks" id="checks"></div></div><div class="field fullrow"><label>종합 의견</label><textarea id="opinion"></textarea></div></div></section>
<section class="card"><h2>7. 첨부 및 보고 요약</h2><div class="filebox noPrint">현장사진 첨부 <input type="file" accept="image/*" multiple onchange="addPhotos(event)"><div class="photoPreview" id="photos"></div></div><br><div class="summarybox" id="reportSummary"></div><div class="actions noPrint"><button class="btn primary" onclick="saveProject()">저장</button><button class="btn" onclick="printReport()">보고서 PDF/인쇄</button><button class="btn warn" onclick="duplicateProject()">복사</button><button class="btn danger" onclick="deleteProject()">삭제</button></div></section>
</main></div>
<script>
const KEY='bidProjectSystemV1';
const checklist=['현장설명회 참석','도면/시방서 수령','지급자재 확인','질의사항 제출','입찰일 확인','입찰보증 확인','투찰금액 검토','제출서류 확인','개찰결과 확인','계약조건 확인','착공 준비사항 확인','협력업체 검토'];
let projects=JSON.parse(localStorage.getItem(KEY)||'null')||[{id:crypto.randomUUID(),name:'○○항 방파제 보강공사',client:'한국○○공사',manager:'한재식',status:'입찰예정',briefingDate:'2026-07-08T14:00',type:'항만토목',location:'부산광역시 ○○구',bidMethod:'종합심사낙찰제',startDate:'2026-09-01',endDate:'2028-06-30',estimate:25000000000,scope:'기존 방파제 보강, 케이슨 설치, 준설, 사석투하, 콘크리트 구조물 시공',briefingAttend:'참석',questionDue:'2026-07-12T17:00',bidDue:'2026-07-25T10:00',openDate:'2026-07-25T11:00',expectedPrice:24800000000,bidPrice:22100000000,documents:'준비중',decision:'참여',decisionReason:'',bidMemo:'해상작업 장비 확보 및 태풍기 공정 지연 검토 필요',result:'미정',winner:'',winPrice:'',ourRank:'',contractDate:'',contractPrice:'',wonDate:'',dept:'토목영업팀',resultMemo:'',materials:[['케이슨','발주처','설계도서 참조','착공 후 순차','공급일정 확인 필요'],['철근','시공사','설계도서 참조','공정별 반입','직접 구매']],qas:[['지급자재 공급시기','착공 후 순차 지급 예정','공정표 작성 시 반영'],['해상작업 제한조건','기상특보 시 작업 통제','공기 리스크 반영']],riskWeather:'높음',riskCivil:'보통',riskMaterial:'보통',riskSchedule:'높음',checks:['현장설명회 참석','도면/시방서 수령','지급자재 확인','입찰일 확인'],opinion:'해상작업 비중이 높아 기상 영향에 따른 공기 지연 가능성이 큼. 지급자재 공급 일정과 해상장비 확보 가능 여부를 입찰 전 추가 검토 필요.',photos:[]}];
let currentId=projects[0].id;
const ids=['name','client','manager','status','briefingDate','type','location','bidMethod','startDate','endDate','estimate','scope','briefingAttend','questionDue','bidDue','openDate','expectedPrice','bidPrice','documents','decision','decisionReason','bidMemo','result','winner','winPrice','ourRank','contractDate','contractPrice','wonDate','dept','resultMemo','riskWeather','riskCivil','riskMaterial','riskSchedule','opinion'];
function fmtMoney(v){return v?Number(v).toLocaleString()+'원':''}function riskClass(v){return v==='높음'?'risk-high':v==='보통'?'risk-mid':'risk-low'}function cur(){return projects.find(p=>p.id===currentId)||projects[0]}
function months(s,e){if(!s||!e)return'';let a=new Date(s),b=new Date(e);let m=(b.getFullYear()-a.getFullYear())*12+(b.getMonth()-a.getMonth())+1;return m>0?m+'개월':''}
function bidRate(){let p=cur();let base=Number(p.expectedPrice||p.estimate||0),bid=Number(p.bidPrice||0);return base&&bid?((bid/base)*100).toFixed(2)+'%':''}
function saveStore(){localStorage.setItem(KEY,JSON.stringify(projects))}
function renderList(){let q=document.getElementById('search').value.toLowerCase(),fs=document.getElementById('filterStatus').value;let box=document.getElementById('projectList');box.innerHTML='';projects.filter(p=>(!fs||p.status===fs)&&[p.name,p.client,p.type,p.status].join(' ').toLowerCase().includes(q)).forEach(p=>{let div=document.createElement('div');div.className='item '+(p.id===currentId?'active':'');div.onclick=()=>{currentId=p.id;loadProject()};div.innerHTML=`<b>${p.name||'무제 현장'}</b><span><span class="pill status-${p.status}">${p.status}</span><br>${p.client||''} · ${p.type||''}<br>입찰: ${p.bidDue?String(p.bidDue).replace('T',' '):'미정'}</span>`;box.appendChild(div)})}
function renderStats(){let total=projects.length,due=projects.filter(p=>p.status==='입찰예정').length,sub=projects.filter(p=>p.status==='투찰완료').length,won=projects.filter(p=>p.status==='수주'||p.result==='낙찰/수주').length,lost=projects.filter(p=>['미수주','포기'].includes(p.status)||['탈락/미수주','유찰','취소'].includes(p.result)).length;let closed=won+lost;document.getElementById('stTotal').textContent=total;document.getElementById('stBidDue').textContent=due;document.getElementById('stSubmitted').textContent=sub;document.getElementById('stWon').textContent=won;document.getElementById('stLost').textContent=lost;document.getElementById('stWinRate').textContent=closed?Math.round(won/closed*100)+'%':'0%'}
function renderSummaryRows(){let q=document.getElementById('search').value.toLowerCase(),fs=document.getElementById('filterStatus').value;document.getElementById('summaryRows').innerHTML=projects.filter(p=>(!fs||p.status===fs)&&[p.name,p.client,p.type,p.status].join(' ').toLowerCase().includes(q)).map(p=>`<tr onclick="currentId='${p.id}';loadProject()" style="cursor:pointer"><td><span class="pill status-${p.status}">${p.status}</span></td><td>${p.name||''}</td><td>${p.client||''}</td><td>${p.type||''}</td><td>${p.briefingDate?String(p.briefingDate).replace('T',' '):''}</td><td>${p.bidDue?String(p.bidDue).replace('T',' '):''}</td><td class="money">${fmtMoney(p.bidPrice)}</td><td>${p.result||''} ${p.ourRank?'/ '+p.ourRank:''}</td><td>${p.decision||''}</td></tr>`).join('')}
function renderTimeline(){let p=cur();let steps=['설명회','입찰예정','투찰완료','개찰완료','수주'];let idx=Math.max(0,steps.indexOf(p.status));if(p.status==='미수주'||p.status==='포기')idx=4;document.getElementById('timeline').innerHTML=steps.map((s,i)=>`<div class="step ${i<idx?'done':i===idx?'now':''}"><b>${s}</b><span>${i===0?(p.briefingDate||'일정 미정'):i===1?(p.bidDue||'일정 미정'):i===2?(p.bidPrice?fmtMoney(p.bidPrice):'투찰 전'):i===3?(p.openDate||'개찰 전'):(p.status==='수주'?(p.wonDate||'수주 확정'):(p.status==='미수주'||p.status==='포기'?p.status:'결과 대기'))}</span></div>`).join('')}
function renderMaterials(){let p=cur();document.getElementById('materials').innerHTML=(p.materials||[]).map((r,i)=>`<tr>${[0,1,2,3,4].map(j=>`<td><input value="${r[j]||''}" onchange="cur().materials[${i}][${j}]=this.value;saveProject(false)"></td>`).join('')}<td class="noPrint"><button class="btn danger" onclick="cur().materials.splice(${i},1);saveProject(false);renderMaterials()">삭제</button></td></tr>`).join('')}
function renderQA(){let p=cur();document.getElementById('qas').innerHTML=(p.qas||[]).map((r,i)=>`<tr>${[0,1,2].map(j=>`<td><textarea onchange="cur().qas[${i}][${j}]=this.value;saveProject(false)">${r[j]||''}</textarea></td>`).join('')}<td class="noPrint"><button class="btn danger" onclick="cur().qas.splice(${i},1);saveProject(false);renderQA()">삭제</button></td></tr>`).join('')}
function renderChecks(){let p=cur();document.getElementById('checks').innerHTML=checklist.map(c=>`<label><input type="checkbox" ${p.checks?.includes(c)?'checked':''} onchange="toggleCheck('${c}',this.checked)">${c}</label>`).join('')}
function renderPhotos(){let p=cur();document.getElementById('photos').innerHTML=(p.photos||[]).map(src=>`<img src="${src}">`).join('')}
function renderReport(){let p=cur();document.getElementById('reportSummary').innerHTML=`<b>보고 요약</b><br>· 현장명: ${p.name||''}<br>· 발주처/공종: ${p.client||''} / ${p.type||''}<br>· 진행상태: <span class="pill status-${p.status}">${p.status||''}</span><br>· 입찰일: ${p.bidDue?String(p.bidDue).replace('T',' '):'미정'} / 개찰일: ${p.openDate?String(p.openDate).replace('T',' '):'미정'}<br>· 기초/예정금액: ${fmtMoney(p.expectedPrice||p.estimate)} / 투찰금액: ${fmtMoney(p.bidPrice)} / 투찰률: ${bidRate()}<br>· 개찰결과: ${p.result||'미정'} ${p.ourRank?'/ '+p.ourRank:''}<br>· 주요 리스크: 기상 <span class="${riskClass(p.riskWeather)}">${p.riskWeather}</span>, 민원 <span class="${riskClass(p.riskCivil)}">${p.riskCivil}</span>, 자재 <span class="${riskClass(p.riskMaterial)}">${p.riskMaterial}</span>, 공기 <span class="${riskClass(p.riskSchedule)}">${p.riskSchedule}</span><br>· 종합의견: ${p.opinion||''}`}
function loadProject(){let p=cur();ids.forEach(id=>{let el=document.getElementById(id); if(el) el.value=p[id]??''});document.getElementById('duration').value=months(p.startDate,p.endDate);document.getElementById('bidRate').value=bidRate();renderMaterials();renderQA();renderChecks();renderPhotos();renderReport();renderTimeline();renderAll(false)}
function saveProject(alertIt=true){let p=cur();ids.forEach(id=>{let el=document.getElementById(id); if(el)p[id]=el.value});p.duration=months(p.startDate,p.endDate);saveStore();renderAll(false);document.getElementById('duration').value=p.duration;document.getElementById('bidRate').value=bidRate();renderReport();renderTimeline();if(alertIt)alert('저장되었습니다.')} 
function renderAll(load=false){renderList();renderStats();renderSummaryRows();if(load)loadProject()}
function newProject(){let p={id:crypto.randomUUID(),name:'신규 현장',client:'',manager:'한재식',status:'설명회',type:'일반토목',bidMethod:'적격심사',briefingAttend:'참석',documents:'미확인',decision:'검토중',result:'미정',materials:[],qas:[],riskWeather:'낮음',riskCivil:'낮음',riskMaterial:'낮음',riskSchedule:'낮음',checks:[],photos:[]};projects.unshift(p);currentId=p.id;saveStore();loadProject()}
function duplicateProject(){let p=JSON.parse(JSON.stringify(cur()));p.id=crypto.randomUUID();p.name=(p.name||'현장')+' - 복사본';projects.unshift(p);currentId=p.id;saveStore();loadProject()}
function deleteProject(){if(projects.length===1)return alert('최소 1개 현장은 남겨야 합니다.');if(confirm('현재 현장을 삭제할까요?')){projects=projects.filter(p=>p.id!==currentId);currentId=projects[0].id;saveStore();loadProject()}}
function addMaterial(){cur().materials=cur().materials||[];cur().materials.push(['','','','','']);saveProject(false);renderMaterials()}
function addQA(){cur().qas=cur().qas||[];cur().qas.push(['','','']);saveProject(false);renderQA()}
function toggleCheck(c,on){let p=cur();p.checks=p.checks||[];p.checks=on?[...new Set([...p.checks,c])]:p.checks.filter(x=>x!==c);saveProject(false)}
function addPhotos(e){let p=cur();p.photos=p.photos||[];[...e.target.files].slice(0,8).forEach(f=>{let r=new FileReader();r.onload=()=>{p.photos.push(r.result);saveProject(false);renderPhotos()};r.readAsDataURL(f)})}
function printReport(){saveProject(false);window.print()}
function downloadJSON(){saveProject(false);let blob=new Blob([JSON.stringify(projects,null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='현장설명회_입찰_수주관리_백업.json';a.click()}
function uploadJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{projects=JSON.parse(r.result);currentId=projects[0].id;saveStore();loadProject()}catch{alert('JSON 파일을 확인하세요.')}};r.readAsText(f)}
['startDate','endDate','expectedPrice','estimate','bidPrice'].forEach(id=>document.addEventListener('input',e=>{if(e.target.id===id){saveProject(false);document.getElementById('duration').value=months(cur().startDate,cur().endDate);document.getElementById('bidRate').value=bidRate();renderReport()}}));
loadProject();
</script>
</body>
</html>
